<!DOCTYPE html>
<html>

<head>

<title>Student Results Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#f5f5f7;
padding:40px;
color:#1d1d1f;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-weight:600;
display:flex;
align-items:center;
gap:10px;
}

.cap{
font-size:28px;
color:black;
}

.search{
padding:10px 15px;
border-radius:10px;
border:1px solid #ddd;
width:220px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
border-left:6px solid #ff3b30;
}

.card h3{
font-size:14px;
color:#777;
}

.card p{
font-size:30px;
font-weight:600;
margin-top:10px;
color:#ff3b30;
}

/* TABLE */

.table-container{
background:white;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
margin-bottom:40px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ff3b30;
color:white;
padding:14px;
}

td{
padding:14px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#fff2f2;
}

/* GRAPH */

.chart-container{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="header">

<h1>
<span class="cap">🎓</span>
Student Results Dashboard
</h1>

<input type="text" id="search" class="search" placeholder="Search Student">

</div>

<div class="stats">

<div class="card">
<h3>Total Students</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Average Score</h3>
<p id="avg">0</p>
</div>

<div class="card">
<h3>Top Score</h3>
<p id="top">0</p>
</div>

</div>

<div class="table-container">

<table id="table">

<thead>
<tr>
<th>S.No</th>
<th>Name</th>
<th>Course</th>
<th>Year</th>
<th>Score</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div class="chart-container">

<h2 style="margin-bottom:20px;">📈 Student Score Trend</h2>

<canvas id="marksChart"></canvas>

</div>

<script>

let students=[];

fetch("http://51.20.184.110:5000/students")
.then(res=>res.json())
.then(data=>{

students=data;

renderTable(data);
updateStats(data);
createChart(data);

});

function renderTable(data){

const tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

data.forEach((r,i)=>{

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.name}</td>
<td>${r.course}</td>
<td>${r.year}</td>
<td>${r.score}</td>
</tr>
`;

});

}

function updateStats(data){

let total=data.length;
let sum=0;
let top=0;

data.forEach(s=>{

sum+=s.score;

if(s.score>top) top=s.score;

});

let avg=(sum/total).toFixed(2) || 0;

document.getElementById("total").innerText=total;
document.getElementById("avg").innerText=avg;
document.getElementById("top").innerText=top;

}

function createChart(data){

let names=data.map(s=>s.name);
let scores=data.map(s=>s.score);

new Chart(document.getElementById("marksChart"),{

type:"line",

data:{
labels:names,
datasets:[{
data:scores,
borderColor:"#ff3b30",
backgroundColor:"rgba(255,59,48,0.15)",
borderWidth:3,
tension:0.4,
fill:true
}]
},

options:{
plugins:{legend:{display:false}},
scales:{
y:{
beginAtZero:true,
max:10
}
}
}

});

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let filtered=students.filter(s=>

s.name.toLowerCase().includes(value) ||
s.course.toLowerCase().includes(value)

);

renderTable(filtered);

});

</script>

</body>

</html>
